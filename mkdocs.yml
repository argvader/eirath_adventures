site_name: "Eirath Adventures"
site_url: "https://argvader.github.io/eirath_adventures/"

# Player-provided character notes live beside portraits under docs/assets/<cat>/<slug>.md.
# They are source material distilled into wiki pages, not pages themselves — keep them
# out of the build so mkdocs doesn't render them as orphan pages (fails --strict).
exclude_docs: |
  assets/**/*.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    # Dark scheme — default. Real colors come from docs/stylesheets/extra.css.
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light
    # Light scheme.
    - scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark
  font:
    text: Marcellus
    code: Fira Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks/wiki_images.py

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences

# The summarizer grows this nav as sessions and wiki pages are created. It adds
# a "Sessions:" section and a "Wiki:" section (with pcs/npcs/factions/locations
# children) on first use — see SESSION_SUMMARIZER.md.
nav:
  - Home: index.md
  - Sessions:
      - "1. Twelve Missing": sessions/2026-07-05.md
      - "2. I Think We're Still Here": sessions/2026-07-19.md
  - Wiki:
      - Player Characters:
          - Icarus: wiki/pcs/icarus.md
          - Wilonet: wiki/pcs/wilonet.md
          - Grano: wiki/pcs/grano.md
          - Vorhan Aru Nyshara: wiki/pcs/vorhan-aru-nyshara.md
      - NPCs:
          - Jonas Dawn: wiki/npcs/jonas-dawn.md
          - Miriam Dawn: wiki/npcs/miriam-dawn.md
          - Old Marnie: wiki/npcs/old-marnie.md
          - The Silverbrier Head of Security: wiki/npcs/silverbrier-head-of-security.md
          - Halvik Dern: wiki/npcs/halvik-dern.md
          - Cara: wiki/npcs/cara.md
          - The Old Farmer: wiki/npcs/the-old-farmer.md
          - The Voice: wiki/npcs/the-voice.md
      - Factions:
          - The Silverbrier Family: wiki/factions/silverbrier-family.md
          - The Church of the Dawn: wiki/factions/church-of-the-dawn.md
      - Locations:
          - Timberfall: wiki/locations/timberfall.md
          - The Graylight Forest: wiki/locations/graylight-forest.md
          - The Fat Goat: wiki/locations/the-fat-goat.md
          - Ol' Marnie's: wiki/locations/ol-marnies.md
          - The Silverbrier Estate: wiki/locations/silverbrier-estate.md
          - The Logging Camp: wiki/locations/the-logging-camp.md
